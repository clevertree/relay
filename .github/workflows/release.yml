name: Build & Publish Release
on:
  push:
    tags: ['v*']

jobs:
  build-binaries:
    name: Build CLI binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: relay-linux-x86_64.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: relay-linux-aarch64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: relay-windows-amd64.zip
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: relay-macos-amd64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Add target
        run: rustup target add ${{ matrix.target }} || true

      - name: Build
        run: |
          set -euo pipefail
          cargo build --release --manifest-path crates/relay-cli/Cargo.toml --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          set -euo pipefail
          BINPATH=target/${{ matrix.target }}/release/relay
          mkdir -p out
          case "${{ matrix.os }}" in
            windows-latest)
              # produce a zip for Windows
              cp "$BINPATH" relay.exe || true
              zip -j out/${{ matrix.artifact }} relay.exe || true
              ;;
            *)
              tar -C target/${{ matrix.target }}/release -czf out/${{ matrix.artifact }} relay || true
              ;;
          esac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/${{ matrix.artifact }}

  publish-release:
    name: Create Release & Publish Artifacts
    runs-on: ubuntu-latest
    needs: build-binaries
    env:
      CF_PURGE_EVERYTHING: ${{ secrets.CF_PURGE_EVERYTHING }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute checksums
        run: |
          set -euo pipefail
          mkdir -p checksums
          for f in artifacts/*; do
            sha256sum "$f" | tee checksums/$(basename "$f").sha256
          done

      - name: Sign artifacts (optional)
        run: |
          set -euo pipefail
          SIGNING_KEY='${{ secrets.SIGNING_KEY }}'
          if [ -z "${SIGNING_KEY}" ]; then
            echo "SIGNING_KEY not set; skipping signing"; exit 0
          fi
          echo "$SIGNING_KEY" > signing.key
          gpg --batch --import signing.key
          for f in artifacts/*; do
            gpg --batch --yes --armor --output "$f.asc" --detach-sign "$f" || true
          done

      - name: Upload assets to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*
            checksums/*
            artifacts/*.asc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Purge Cloudflare cache for release (files)
        uses: cloudflare/purge-cache-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          zone: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          files: |
            https://node1.relaynet.online/downloads/${{ github.ref_name }}/*

      - name: Purge Cloudflare cache for release (full zone, optional)
        run: |
          set -euo pipefail
          if [ "${CF_PURGE_EVERYTHING:-}" = 'true' ]; then
            echo "Purging Cloudflare zone ${CLOUDFLARE_ZONE_ID}"
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"purge_everything":true}' || true
          else
            echo "CF_PURGE_EVERYTHING not true; skipping full purge"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_PURGE_EVERYTHING: ${{ secrets.CF_PURGE_EVERYTHING }}
