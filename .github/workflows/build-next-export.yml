name: Build & export Next.js static
on:
  push:
    paths:
      - 'apps/web/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch: {}

jobs:
  export:
    name: Build and export static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Enable corepack & pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js (apps/web)
        run: pnpm --filter ./apps/web build

      - name: Export static site
        run: |
          set -euo pipefail
          cd apps/web
          # Attempt to run an export script, otherwise use next export directly
          if pnpm -s run export; then
            echo "export script ran"
          else
            npx --yes next export
          fi

      - name: Pack exported files
        run: |
          cd apps/web
          if [ -d out ]; then
            TARDIR=out
          elif [ -d .next ]; then
            # some next versions place exported files under .next or .next/export
            if [ -d .next/export ]; then TARDIR=.next/export; else TARDIR=.next; fi
          else
            echo "No export output found"; exit 1
          fi
          tar -czf web-static.tar.gz -C "$TARDIR" .

      - name: Upload export artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-static
          path: apps/web/web-static.tar.gz
